name: Code Quality Check

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: write # Required to push formatting fixes and create releases

jobs:
  # 1. First job runs all code quality checks and auto-formats
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      # Auto-format with StyLua (modifies files in place)
      - name: Auto-format with StyLua
        uses: JohnnyMorganz/stylua-action@v5.0.0
        with:
          token: ${{ secrets.MY_WORKFLOW_SECRET }}
          version: 2.0.2
          args: .

      # Automatically commit and push changes back if StyLua modified any files
      - name: Commit and push formatting fixes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: automated code formatting (StyLua)"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # Check against bugs/syntax errors (runs on the formatted code)
      - name: Lua Linter (Luacheck)
        uses: lunarmodules/luacheck@v1
        with:
          args: .

  # 2. Second job handles automated releases if checks pass
  release:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: main # Always pull latest main head to catch the formatting commit if it happened
          fetch-depth: 0

      # Parse the version line directly from the TOC file
      - name: Extract version from TOC
        id: get_version
        run: |
          VERSION=$(grep -i '^## Version:' StarCursor.toc | sed -E 's/^## Version:[[:space:]]*//I' | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Make sure we don't accidentally recreate an existing release
      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.get_version.outputs.version }} already released. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Deploy release with autogenerated release notes
      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
